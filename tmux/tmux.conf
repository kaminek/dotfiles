
# change the default prefix
unbind C-b
set -g prefix C-a

# this allows "C-a" inside tmux by hitting "C-a a":
bind a send-prefix
bind-key C-a send-prefix

# Restoring Clear Screen (C-l)
bind C-l send-keys 'C-l'

# renumber windows on the fly
set-option -g renumber-windows on

# Set the terminal type so colors get rendered correctly
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# make new window panes with current pwd
bind-key v split-window -h -c "#{pane_current_path}"
bind-key h split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# create new window with custom name
bind-key C command-prompt -p "Name of new window: " "new-window -n '%%'"

# Allow the arrow key to be used immediately after changing windows
set-option -g repeat-time 0

# Fix to allow mousewheel/trackpad scrolling in tmux 2.1
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" \
                                              "select-pane -t =; copy-mode -e; \
                                               send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" \
                                                "send-keys -M" \
                                                "select-pane -t =; send-keys -M"
# Start Pane numbering at 1
set -g pane-base-index 1
# Start Windows numbering at 1
set -g base-index 1

# set escape time so vim is responsive inside tmux
set -g escape-time 1

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on


# Do not copy selection and cancel copy mode on drag end event
# Prefer iTerm style selection: select, then mouse click to copy to buffer
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDown1Pane select-pane \;\
  send-keys -X copy-pipe "pbcopy" \;\
  send-keys -X clear-selection

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# resize pane
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# set to main-horizontal, 60% height for main pane
bind m set-window-option main-pane-height 60\; select-layout main-horizontal

# Pass the keys through, especially necessary to make full use of native
# vim keymappings.
# set-window-option -g xterm-keys on
set -g xterm-keys on

# unbind layout
unbind Space

# auto-rename window to current command or directory
set-option -g allow-rename on
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'

# History setting
set -g history-limit 100000

# tmux messages are displayed for 3 seconds
set -g display-time 3000

# focus events enabled for terminals that support them
set -g focus-events on

# Set window notifications
set -g visual-activity off
setw -g monitor-activity off

# Switch to last window
bind l last-window

# use fzf to choose session
bind t new-window 'session=$(tmux list-sessions -F "#{session_name}" | \
	fzf --query="$1" --select-1 --exit-0) && \
	tmux switch-client -t "$session"'

# mouse mode support
set -g mouse on

# Toggle synchronoize panes
bind-key S set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# Auto install tpm if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run-shell 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin "arcticicestudio/nord-tmux" # Theme color
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugins config

# auto restore at tmux startup
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'nvim "claude->claude --continue"'

# set theme
# latte, frappe, macchiato or mocha
# default flavor (used if dark/light hook not fired yet)
set -g @catppuccin_flavor 'latte'

# follow macOS dark/light mode (requires tmux >= 3.6 + terminal CSI 2031 support)
# unset all cached @catppuccin_status_* and module color vars so re-run rebuilds them
set-hook -g client-dark-theme {
  run "tmux show-options -g | awk '/^@catppuccin_status_|^@catppuccin_.*_color|^@_ctp_/ {print $1}' | xargs -I {} tmux set-option -gu {}"
  set -g @catppuccin_flavor "mocha"
  set -g @catppuccin_reset "true"
  run ~/.tmux/plugins/tmux/catppuccin.tmux
}
set-hook -g client-light-theme {
  run "tmux show-options -g | awk '/^@catppuccin_status_|^@catppuccin_.*_color|^@_ctp_/ {print $1}' | xargs -I {} tmux set-option -gu {}"
  set -g @catppuccin_flavor "latte"
  set -g @catppuccin_reset "true"
  run ~/.tmux/plugins/tmux/catppuccin.tmux
}

# status bar look (omerxx-style)
set -g status-position bottom
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text " #{b:pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# assemble status line after catppuccin loads (v2 syntax)
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -g status-right-length 100
set -g status-left-length 100
set -g @catppuccin_directory_icon "   "
